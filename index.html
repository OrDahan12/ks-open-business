<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ק"ש - חזקים ביחד</title>
    <style>
        :root { --navy: #1e293b; --gold: #b59410; --bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; color: var(--navy); text-align: right; padding-bottom: 50px; }
        .header { background: white; padding: 30px 20px; text-align: center; border-bottom: 3px solid var(--gold); }
        .city-logo { width: 100px; height: auto; margin-bottom: 10px; }
        .categories { display: flex; overflow-x: auto; padding: 15px; gap: 10px; background: var(--navy); position: sticky; top: 0; z-index: 100; }
        .cat-btn { background: rgba(255,255,255,0.1); color: white; padding: 10px 20px; border-radius: 8px; border: none; font-weight: 700; white-space: nowrap; cursor: pointer; }
        .cat-btn.active { background: var(--gold); }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .hero-card { background: white; border-radius: 20px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; }
        .hero-img { width: 100%; height: 220px; background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Mount_Hermon_and_the_Hula_Valley.jpg/1280px-Mount_Hermon_and_the_Hula_Valley.jpg'); background-size: cover; background-position: center; }
        .card { background: white; border-radius: 15px; margin-bottom: 12px; padding: 20px; border: 1px solid #e2e8f0; }
        .biz-name { font-size: 20px; font-weight: 800; margin: 0 0 5px 0; }
        .btn-call { display: block; background: #f8fafc; color: var(--navy); text-decoration: none; padding: 15px; text-align: center; font-weight: 800; border-radius: 10px; margin-top: 10px; border: 1px solid #e2e8f0; }
        .footer { text-align: center; padding: 40px; color: #64748b; font-weight: 700; border-top: 1px solid #e2e8f0; line-height: 1.6; }
    </style>
</head>
<body>
<div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/he/thumb/3/30/Kiryat_Shmona_Symbol.svg/512px-Kiryat_Shmona_Symbol.svg.png" class="city-logo" alt="סמל">
    <h1>ק"ש - חזקים ביחד 🇮🇱</h1>
</div>
<div class="categories" id="catBar"></div>
<div class="container" id="bizContainer"></div>
<div class="footer">
    נעשה עבור תושבי ועסקיי קרית שמונה באהבה ❤️ 🇮🇱<br>
    ע״י אור דהן | <a href="mailto:or.ohayonn@gmail.com" style="color:var(--gold)">or.ohayonn@gmail.com</a>
</div>
<script>
const catConfig = {
    all: { label: "הכל", hero: "כל המקומות הפתוחים בקרית שמונה" },
    meat: { label: "🥩 בשר ושיפודים", hero: "המבורגרים ושיפודים" },
    sushi: { label: "🍣 סושי וחלבי", hero: "אסיאתי, חומוס וחלבי" },
    pizza: { label: "🍕 פיצות", hero: "פיצריות פעילות" },
    butcher: { label: "🔪 קצביות", hero: "קצביות ובשר טרי" },
    shop: { label: "🛒 מינימרקטים וסופרים", hero: "סופרמרקטים וקניות" },
    leisure: { label: "🎈 פנאי ומתנות", hero: "פנאי, מתנות ועיצוב" },
    beauty: { label: "💅 טיפוח ויופי", hero: "קוסמטיקה וטיפוח" },
    service: { label: "🛠️ רכב ושירותים", hero: "מוסכים ושירותי תחזוקה" }
};
const businesses = [
    { name: "נתח קצבים", cat: "butcher", phone: "04-6905032", info: "בשרים טריים" },
    { name: "معדני הגליל", cat: "butcher", phone: "04-6943905", info: "פתוח עד 18:00" },
    { name: "סופר בשר", cat: "butcher", phone: "04-6875544", info: "פתוח עד 20:00" },
    { name: "SMB Burger", cat: "meat", phone: "052-6164165", info: "המבורגר לילה" },
    { name: "Best Burger", cat: "meat", phone: "077-2016918", info: "11:00-17:00" },
    { name: "אצל סמדי", cat: "meat", phone: "052-2971225", info: "באגט ושיפודים" },
    { name: "יוניקורן Unicorn", cat: "sushi", phone: "04-8457766", info: "סושי ואסיאתי" },
    { name: "חומוס אליהו", cat: "sushi", phone: "04-621-7602", info: "חומוס טרי" },
    { name: "פלאפל עמר", cat: "sushi", phone: "050-431-3104", info: "פלאפל חם" },
    { name: "פיצה העמק", cat: "pizza", phone: "04-958-8992", info: "פתוח למשלוחים" },
    { name: "מינימרקט רסקו", cat: "shop", phone: "04-6951285", info: "06:00-22:00" },
    { name: "מינימרקט דודו עזיז", cat: "shop", phone: "04-6940376", info: "משלוחים חינם" },
    { name: "סופר ספיר יובלים", cat: "shop", phone: "04-695-0008", info: "סופרמרקט פעיל" },
    { name: "אבישי נורליאן", cat: "beauty", phone: "052-555-4210", info: "דיקור ורפואה" },
    { name: "קיה שירות רכב", cat: "service", phone: "04-694-0398", info: "מוסך" }
];
function render(data, catId) {
    const container = document.getElementById('bizContainer');
    container.innerHTML = `<div class="hero-card"><div class="hero-img"></div><div style="padding:20px"><h2>${catConfig[catId].hero}</h2></div></div>`;
    data.forEach(b => {
        const div = document.createElement('div'); div.className = 'card';
        div.innerHTML = `<div class="biz-name">${b.name}</div><div style="color:#64748b">${b.info}</div><a href="tel:${b.phone}" class="btn-call">📞 חיוג: ${b.phone}</a>`;
        container.appendChild(div);
    });
}
const catBar = document.getElementById('catBar');
Object.entries(catConfig).forEach(([id, cfg]) => {
    const btn = document.createElement('button'); btn.className = 'cat-btn'; btn.innerText = cfg.label;
    if(id==='all') btn.classList.add('active');
    btn.onclick = () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(id==='all' ? businesses : businesses.filter(b => b.cat === id), id);
    };
    catBar.appendChild(btn);
});
render(businesses, 'all');
</script>
</body>
</html>
