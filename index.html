<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קרית שמונה - חזקים ביחד 🇮🇱</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1a2744;
            --blue: #2563eb;
            --gold: #d4a017;
            --light-gold: #fef3c7;
            --bg: #f0f4f8;
            --white: #ffffff;
            --text-muted: #64748b;
            --card-border: #e2e8f0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Heebo', -apple-system, sans-serif;
            background: var(--bg);
            margin: 0;
            color: var(--navy);
            text-align: right;
            padding-bottom: 60px;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #1a2744 0%, #2d4a8a 50%, #1a2744 100%);
            padding: 28px 20px 22px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(212,160,23,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        /* The official Kiryat Shmona colorful "8" logo */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .ks-logo {
            display: flex;
            align-items: center;
            gap: 24px;
            background: transparent;
            padding: 0;
        }

        .ks-text {
            font-size: 52px;
            font-weight: 900;
            color: white;
            line-height: 1;
            letter-spacing: -1px;
        }

        /* Colorful "8" circles icon matching official logo */
        .eight-icon {
            width: 80px;
            height: 105px;
            flex-shrink: 0;
        }

        .city-emblem {
            width: 38px;
            height: 38px;
            flex-shrink: 0;
        }

        .city-emblem svg {
            width: 38px;
            height: 38px;
        }

        .header-title {
            position: relative;
            z-index: 1;
        }

        .header-title h1 {
            font-size: 22px;
            margin: 0;
            color: rgba(255,255,255,0.95);
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .header-title .subtitle {
            font-size: 13px;
            color: var(--gold);
            font-weight: 700;
            margin-top: 4px;
        }

        /* ===== CATEGORY NAV ===== */
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 14px 12px;
            gap: 8px;
            background: var(--navy);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }

        .categories::-webkit-scrollbar { display: none; }

        .cat-btn {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.85);
            padding: 9px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.15);
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.25s;
            font-size: 13px;
            font-family: 'Heebo', sans-serif;
        }

        .cat-btn:hover { background: rgba(255,255,255,0.15); }

        .cat-btn.active {
            background: var(--gold);
            color: #1a2744;
            border-color: var(--gold);
            box-shadow: 0 2px 12px rgba(212,160,23,0.5);
        }

        /* ===== CONTAINER ===== */
        .container {
            padding: 20px 16px;
            max-width: 650px;
            margin: 0 auto;
        }

        /* ===== HERO CARD ===== */
        .hero-card {
            background: var(--white);
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        .hero-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .hero-img-placeholder {
            width: 100%;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .hero-text {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, var(--white), #f8fafc);
        }

        .hero-text h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
            color: var(--navy);
        }

        .hero-count {
            display: inline-block;
            background: var(--light-gold);
            color: #92400e;
            font-size: 13px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 50px;
            margin-top: 8px;
        }

        /* ===== BUSINESS CARDS ===== */
        .card {
            background: var(--white);
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .card-content {
            padding: 18px 18px 14px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .cat-icon-badge {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            background: #f1f5f9;
        }

        .card-text { flex: 1; }

        .biz-name {
            font-size: 18px;
            font-weight: 800;
            margin: 0 0 4px 0;
            color: var(--navy);
            line-height: 1.3;
        }

        .biz-info {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .btn-call {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a2744, #2d4a8a);
            color: white;
            text-decoration: none;
            padding: 14px 18px;
            font-weight: 800;
            font-size: 17px;
            gap: 8px;
            transition: all 0.2s;
            font-family: 'Heebo', sans-serif;
            letter-spacing: 0.5px;
        }

        .btn-call:hover {
            background: linear-gradient(135deg, #2d4a8a, #1a2744);
        }

        .btn-call:active {
            transform: scale(0.98);
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 36px 20px;
            font-weight: 600;
            color: var(--text-muted);
            border-top: 1px solid var(--card-border);
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.8;
        }

        .footer a { color: var(--gold); text-decoration: none; font-weight: 700; }
        .footer .heart { color: #e11d48; }

        .flag-banner {
            background: linear-gradient(135deg, var(--navy), #1e3a8a);
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ===== JOIN FORM ===== */
        .join-section {
            display: none;
            padding: 20px 16px;
            max-width: 650px;
            margin: 0 auto;
        }

        .join-card {
            background: var(--white);
            border-radius: 20px;
            padding: 28px 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }

        .join-card h2 {
            font-size: 22px;
            font-weight: 900;
            color: var(--navy);
            margin: 0 0 6px 0;
        }

        .join-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 14px;
            color: var(--navy);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--card-border);
            border-radius: 10px;
            font-family: 'Heebo', sans-serif;
            font-size: 15px;
            color: var(--navy);
            background: #f8fafc;
            transition: border-color 0.2s, box-shadow 0.2s;
            text-align: right;
            direction: rtl;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
            background: white;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1a2744, #2d4a8a);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Heebo', sans-serif;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #2d4a8a, #1a2744);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(26,39,68,0.3);
        }

        .success-banner {
            display: none;
            background: #dcfce7;
            border: 1.5px solid #86efac;
            color: #166534;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 16px;
            margin-top: 16px;
            line-height: 1.6;
        }

        .cat-btn.add-btn {
            background: var(--gold);
            color: #1a2744;
            border-color: var(--gold);
        }

        .cat-btn.add-btn:hover {
            background: #c99010;
            border-color: #c99010;
        }

        .cat-btn.add-btn.active {
            background: #c99010;
            border-color: #c99010;
            box-shadow: 0 2px 12px rgba(212,160,23,0.6);
        }
    </style>
</head>

// Build category bar
const catBar = document.getElementById('catBar');
catBar.innerHTML = Object.entries(catConfig).map(([id, cfg]) =>
    `<button class="cat-btn ${id==='all'?'active':''}" onclick="filterData('${id}', this)">${cfg.label}</button>`
).join('') + `<button class="cat-btn add-btn" onclick="showJoinForm(this)">➕ הוסף עסק</button>`;

function buildHeroHTML(catId, count) {
    const cfg = catConfig[catId];
    // Try image first, fallback to gradient+emoji
    return `
    <div class="hero-card">
        <div style="position:relative;width:100%;height:220px;overflow:hidden;">
            <div style="position:absolute;inset:0;${cfg.gradient ? `background:${cfg.gradient}` : ''};display:flex;align-items:center;justify-content:center;font-size:80px;">
                ${cfg.emoji}
            </div>
            <img
                src="${cfg.imgUrl}"
                alt="${cfg.hero}"
                style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity 0.4s;"
                onerror="this.style.opacity='0'"
                onload="this.style.opacity='1'"
                style="opacity:0;"
            />
        </div>
        <div class="hero-text">
            <h2>${cfg.hero}</h2>
            <span class="hero-count">${count} עסקים פתוחים</span>
        </div>
    </div>`;
}

function renderCards(data, catId) {
    const container = document.getElementById('bizContainer');
    container.innerHTML = buildHeroHTML(catId, data.length);

    data.forEach(b => {
        const cfg = catConfig[b.cat];
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-content">
                <div class="cat-icon-badge">${cfg.emoji}</div>
                <div class="card-text">
                    <h2 class="biz-name">${b.name}</h2>
                    <div class="biz-info">🕐 ${b.info}</div>
                </div>
            </div>
            ${b.phone ? `<a href="tel:${b.phone}" class="btn-call">📞 &nbsp;${b.phone}</a>` : ''}
        `;
        container.appendChild(card);
    });
}

function filterData(id, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('joinSection').style.display = 'none';
    document.getElementById('bizContainer').style.display = '';
    const filtered = id === 'all' ? businesses : businesses.filter(b => b.cat === id);
    renderCards(filtered, id);
}

function showJoinForm(btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('bizContainer').style.display = 'none';
    document.getElementById('joinSection').style.display = 'block';
    document.getElementById('joinSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function handleJoinSubmit(e) {
    e.preventDefault();
    const bizName   = document.getElementById('f-biz-name').value.trim();
    const cat       = document.getElementById('f-cat').value;
    const phone     = document.getElementById('f-phone').value.trim();
    const hours     = document.getElementById('f-hours').value.trim();
    const contact   = document.getElementById('f-contact').value.trim();
    const email     = document.getElementById('f-email').value.trim();
    const notes     = document.getElementById('f-notes').value.trim();

    const subject = `בקשה להוספת עסק לרשימה: ${bizName}`;
    const body =
        `שם העסק: ${bizName}\n` +
        `קטגוריה: ${cat}\n` +
        `טלפון לפרסום: ${phone}\n` +
        `שעות / תיאור: ${hours || '—'}\n` +
        `איש קשר: ${contact}\n` +
        `מייל איש קשר: ${email}\n` +
        `הערות: ${notes || '—'}`;

    const mailto = `mailto:or.orhayonn@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.location.href = mailto;

    document.getElementById('successBanner').style.display = 'block';
    document.getElementById('joinForm').reset();
}

renderCards(businesses, 'all');
</script>
