<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <style>
        :root {
            --navy: #1a2744;
            --blue: #2563eb;
            --gold: #d4a017;
            --light-gold: #fef3c7;

            --white: #ffffff;
            --text-muted: #64748b;
            --card-border: #e2e8f0;

        * { box-sizing: border-box; }

        body {
            font-family: 'Heebo', -apple-system, sans-serif;
            background: var(--bg);
            margin: 0;
            color: var(--navy);
            text-align: right;
            padding-bottom: 60px;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #1a2744 0%, #2d4a8a 50%, #1a2744 100%);
            padding: 28px 20px 22px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(212,160,23,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        /* The official Kiryat Shmona colorful "8" logo */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .ks-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 10px 16px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .ks-text {
            font-size: 26px;
            font-weight: 900;
            color: #6b21a8;
            line-height: 1;
        }

        /* Colorful "8" circles icon matching official logo */
        .eight-icon {
            position: relative;
            width: 44px;
            height: 56px;
            flex-shrink: 0;
        }

        .eight-icon svg {
            width: 44px;
            height: 56px;
        }

        .city-emblem {
            width: 38px;
            height: 38px;
            flex-shrink: 0;
        }

        .city-emblem svg {
            width: 38px;
            height: 38px;
        }

        .header-title {
            position: relative;
            z-index: 1;
        }

        .header-title h1 {
            font-size: 22px;
            margin: 0;
            color: rgba(255,255,255,0.95);
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .header-title .subtitle {
            font-size: 13px;
            color: var(--gold);
            font-weight: 700;
            margin-top: 4px;
        }

        /* ===== CATEGORY NAV ===== */
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 14px 12px;
            gap: 8px;
            background: var(--navy);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }

        .categories::-webkit-scrollbar { display: none; }

        .cat-btn {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.85);
            padding: 9px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.15);
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.25s;
            font-size: 13px;
            font-family: 'Heebo', sans-serif;
        }

        .cat-btn:hover { background: rgba(255,255,255,0.15); }

        .cat-btn.active {
            background: var(--gold);
            color: #1a2744;
            border-color: var(--gold);
            box-shadow: 0 2px 12px rgba(212,160,23,0.5);
        }

        /* ===== CONTAINER ===== */
        .container {
            padding: 20px 16px;
            max-width: 650px;
            margin: 0 auto;
        }

        /* ===== HERO CARD ===== */
        .hero-card {
            background: var(--white);
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        .hero-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .hero-img-placeholder {
            width: 100%;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .hero-text {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, var(--white), #f8fafc);
        }

        .hero-text h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
            color: var(--navy);
        }

        .hero-count {
            display: inline-block;
            background: var(--light-gold);
            color: #92400e;
            font-size: 13px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 50px;
            margin-top: 8px;
        }

        /* ===== BUSINESS CARDS ===== */
        .card {
            background: var(--white);
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--card-border);
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .card-content {
            padding: 18px 18px 14px;
            display: flex;

        .cat-icon-badge {

            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;

        .biz-name {

        .btn-call {

            color: white;

            font-size: 17px;

// Build category bar
const catBar = document.getElementById('catBar');
catBar.innerHTML = Object.entries(catConfig).map(([id, cfg]) =>
    `<button class="cat-btn ${id==='all'?'active':''}" onclick="filterData('${id}', this)">${cfg.label}</button>`
).join('');

function buildHeroHTML(catId, count) {
    const cfg = catConfig[catId];
    // Try image first, fallback to gradient+emoji
    return `
    <div class="hero-card">
        <div style="position:relative;width:100%;height:220px;overflow:hidden;">
            <div style="position:absolute;inset:0;${cfg.gradient ? `background:${cfg.gradient}` : ''};display:flex;align-items:center;justify-content:center;font-size:80px;">
                ${cfg.emoji}
            </div>
            <img
                src="${cfg.imgUrl}"
                alt="${cfg.hero}"
                style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity 0.4s;"
                onerror="this.style.opacity='0'"
                onload="this.style.opacity='1'"
                style="opacity:0;"
            />
        </div>
        <div class="hero-text">
            <h2>${cfg.hero}</h2>
            <span class="hero-count">${count} עסקים פתוחים</span>
        </div>
    </div>`;
}

function renderCards(data, catId) {
    const container = document.getElementById('bizContainer');
    container.innerHTML = buildHeroHTML(catId, data.length);

    data.forEach(b => {
        const cfg = catConfig[b.cat];
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-content">
                <div class="cat-icon-badge">${cfg.emoji}</div>
                <div class="card-text">
                    <h2 class="biz-name">${b.name}</h2>
                    <div class="biz-info">🕐 ${b.info}</div>
                </div>
            </div>
            ${b.phone ? `<a href="tel:${b.phone}" class="btn-call">📞 &nbsp;${b.phone}</a>` : ''}
        `;
        container.appendChild(card);
    });
}

function filterData(id, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = id === 'all' ? businesses : businesses.filter(b => b.cat === id);
    renderCards(filtered, id);
}

renderCards(businesses, 'all');
</script>
