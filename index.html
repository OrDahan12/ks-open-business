<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ק"ש - חזקים ביחד</title>
    <style>
        :root { 
            --navy: #1e293b; /* כחול עמוק יוקרתי */
            --gold: #d4af37; /* זהב מעודן */
            --bg: #f1f5f9; 
            --white: #ffffff;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--navy); text-align: right; padding-bottom: 50px; }
        
        /* Header */
        .header { background: var(--white); padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .city-logo { width: 100%; max-width: 250px; height: auto; border-radius: 10px; margin-bottom: 15px; }
        .header h1 { font-size: 30px; margin: 10px 0; color: var(--navy); font-weight: 900; }
        
        /* Categories Navigation */
        .categories { display: flex; overflow-x: auto; padding: 15px; gap: 12px; background: var(--navy); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { background: rgba(255,255,255,0.1); color: white; padding: 12px 24px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); font-weight: 700; white-space: nowrap; cursor: pointer; transition: 0.3s; font-size: 15px; }
        .cat-btn.active { background: var(--gold); color: var(--navy); border-color: var(--gold); }

        .container { padding: 20px; max-width: 650px; margin: 0 auto; }
        
        /* Hero Category Card */
        .hero-card { background: var(--white); color: var(--navy); border-radius: 20px; margin-bottom: 25px; padding: 25px; text-align: center; border: 2px solid var(--gold); }
        .hero-card h2 { margin: 0; font-size: 22px; font-weight: 800; }

        /* Business Card */
        .card { background: var(--white); border-radius: 16px; margin-bottom: 18px; border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; }
        .card-content { padding: 20px; }
        .biz-name { font-size: 20px; font-weight: 800; margin: 0 0 6px 0; color: var(--navy); }
        .biz-info { font-size: 15px; color: #64748b; font-weight: 500; }
        
        /* Phone Button - Large and Clear */
        .btn-call { display: flex; align-items: center; justify-content: center; background: #f8fafc; color: var(--navy); text-decoration: none; padding: 16px; font-weight: 900; font-size: 19px; border-top: 2px solid var(--gold); transition: 0.2s; gap: 10px; }
        .btn-call span { color: var(--gold); font-size: 22px; }
        .btn-call:active { background: #e2e8f0; }

        .footer { text-align: center; padding: 40px 20px; font-weight: 800; color: var(--navy); background: white; border-top: 5px solid var(--gold); }
    </style>
</head>
<body>

<div class="header">

    נוצר באהבה לתושבים ובעלי העסקים בקריית שמונה ❤️<br>חזקים ביחד! 🇮🇱

    { name: "ניצת הדובדבן", cat: "shop", phone: "04-694-0030", info: "מוצרי טבע" }
];

const catBar = document.getElementById('catBar');
catBar.innerHTML = Object.entries(catConfig).map(([id, cfg]) => 
    `<button class="cat-btn ${id==='all'?'active':''}" onclick="filterData('${id}', this)">${cfg.label}</button>`
).join('');

function renderCards(data, catId) {
    const container = document.getElementById('bizContainer');
    container.innerHTML = `<div class="hero-card"><h2>${catConfig[catId].hero}</h2></div>`;
    data.forEach(b => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div class="card-content">
                            <h2 class="biz-name">${b.name}</h2>
                            <div class="biz-info">${b.info}</div>
                         </div>` + 
                         (b.phone ? `<a href="tel:${b.phone}" class="btn-call"><span>📞</span> חיוג: ${b.phone}</a>` : '');
        container.appendChild(card);
    });
}

function filterData(id, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = id === 'all' ? businesses : businesses.filter(b => b.cat === id);
    renderCards(filtered, id);
}

renderCards(businesses, 'all');
</script>
</body>
</html>
