<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ק"ש - חזקים ביחד</title>
    <style>
        :root { --main-dark: #334155; --accent: #64748b; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); text-align: right; padding-bottom: 50px; }
        .header { background: white; padding: 30px 20px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .header h1 { font-size: 28px; margin: 0; color: var(--main-dark); font-weight: 800; }
        .categories { display: flex; overflow-x: auto; padding: 15px; gap: 10px; background: white; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #e2e8f0; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { background: #f1f5f9; padding: 10px 20px; border-radius: 8px; border: 1px solid #e2e8f0; font-weight: 600; white-space: nowrap; cursor: pointer; color: var(--main-dark); transition: 0.3s; }
        .cat-btn.active { background: var(--main-dark); color: white; border-color: var(--main-dark); }
        .container { padding: 20px; max-width: 650px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; margin-bottom: 20px; overflow: hidden; border: 1px solid #e2e8f0; }
        .cat-hero-img { width: 100%; height: 160px; background-size: cover; background-position: center; filter: grayscale(20%); }
        .card-content { padding: 20px; }
        .biz-name { font-size: 20px; font-weight: 700; margin: 0 0 10px 0; color: var(--main-dark); }
        .biz-info { font-size: 15px; color: #475569; line-height: 1.6; }
        .btn-call { display: flex; align-items: center; justify-content: center; background: #f8fafc; color: var(--main-dark); text-decoration: none; padding: 15px; font-weight: 700; border-top: 1px solid #e2e8f0; transition: 0.2s; }
        .btn-call:hover { background: #f1f5f9; }
        .footer { text-align: center; padding: 40px 20px; font-weight: 600; color: var(--accent); }
    </style>
</head>
<body>

<div class="header">
    <div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px;">
        <span>🇮🇱</span>
        <img src="https://upload.wikimedia.org/wikipedia/he/thumb/3/30/Kiryat_Shmona_Symbol.svg/1200px-Kiryat_Shmona_Symbol.svg.png" alt="סמל קרית שמונה" style="height: 50px;">
        <span>🇮🇱</span>
    </div>
    <h1>ק"ש - חזקים ביחד</h1>

<div class="container" id="bizContainer">

const catBar = document.getElementById('catBar');
catBar.innerHTML = Object.entries(catConfig).map(([id, cfg]) => 
    `<button class="cat-btn ${id==='all'?'active':''}" onclick="filterData('${id}', this)">${cfg.label}</button>`
).join('');

function renderCards(data, catId) {
    const container = document.getElementById('bizContainer');
    container.innerHTML = '';
    
    // תמונת קטגוריה מייצגת
    const hero = document.createElement('div');
    hero.className = 'card';
    hero.innerHTML = `<div class="cat-hero-img" style="background-image: url('${catConfig[catId].img}')"></div>
                     <div class="card-content" style="text-align: center; background: #f1f5f9;">
                     <h3 style="margin:0; font-size: 16px;">${catConfig[catId].label}</h3></div>`;
    container.appendChild(hero);

    data.forEach(b => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div class="card-content">
                            <h2 class="biz-name">${b.name}</h2>
                            <div class="biz-info">${b.info}</div>
                         </div>` + 
                         (b.phone ? `<a href="tel:${b.phone}" class="btn-call">📞 התקשר: ${b.phone}</a>` : '');
        container.appendChild(card);
    });
}

function filterData(id, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = id === 'all' ? businesses : businesses.filter(b => b.cat === id);
    renderCards(filtered, id);
}

renderCards(businesses, 'all');
</script>
</body>
</html>
